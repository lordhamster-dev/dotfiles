[mgr]
linemode       = "size"
show_hidden    = true
show_symlink   = true
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
sort_fallback  = "alphabetical"
scrolloff      = 5
mouse_events   = [ "click", "scroll", "drag" ]

[preview]
tab_size   = 2
max_width  = 1000
max_height = 1000

[opener]
edit = [
	{ run = '${EDITOR:=nvim} %s', desc = "$EDITOR", block = true },
]
imgview = [
	{ run = 'gwenview %s' },
]
play = [
	{ run = 'mpv --force-window %s' },
	{ run = 'iina --no-stdin %s' },
	{ run = '''mediainfo %s1; echo "Press enter to exit"; read''', block = true, desc = "Show media info" }
]
archive = [
	{ run = 'unar %s1', desc = "Extract here" },
	{ run = '/Applications/MacZip.app/Contents/MacOS/MacZip %s1', orphan = true, desc = "MacZip" },
]

[open]
rules = [
	{ mime = "text/*",  use = [ "edit", "reveal" ] },
	{ mime = "image/*", use = [ "imgview", "reveal" ] },
	{ mime = "video/*", use = [ "play", "reveal" ] },
	{ mime = "audio/*", use = [ "play", "reveal" ] },
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },

	{ mime = "application/json", use = [ "edit", "reveal" ] },
	{ mime = "*/javascript",     use = [ "edit", "reveal" ] },

	{ mime = "application/zip",             use = [ "extract", "reveal", "archive" ] },
	{ mime = "application/gzip",            use = [ "extract", "reveal", "archive" ] },
	{ mime = "application/x-tar",           use = [ "extract", "reveal", "archive" ] },
	{ mime = "application/x-bzip",          use = [ "extract", "reveal", "archive" ] },
	{ mime = "application/x-bzip2",         use = [ "extract", "reveal", "archive" ] },
	{ mime = "application/x-7z-compressed", use = [ "extract", "reveal", "archive" ] },
	{ mime = "application/x-rar",           use = [ "extract", "reveal", "archive" ] },

	{ mime = "*", use = [ "open", "reveal" ] },
]

[tasks]
file_workers    = 3
plugin_workers  = 5
fetch_workers   = 5
preload_workers = 2
process_workers = 5
bizarre_retry    = 3
image_alloc      = 536870912  # 512MB
image_bound      = [ 10000, 10000 ]
suppress_preload = false
